version: "3.9"

# ============================================================
# AI Accounting Software — Production Docker Compose
# Phase 5: Scale & SaaS Infrastructure
# ============================================================
#
# Services:
#   api       — FastAPI backend (Python)
#   worker    — Celery worker (background jobs: AI classification, reports)
#   beat      — Celery beat (scheduled: daily reconciliation, GSTR reminders)
#   db        — PostgreSQL 16
#   redis     — Redis (Celery broker + cache)
#   nginx     — Reverse proxy + SSL termination
#
# Usage:
#   cp .env.example .env                 # fill in your secrets
#   docker-compose up -d                 # start all services
#   docker-compose logs -f api           # tail API logs
#   docker-compose exec api alembic upgrade head   # run migrations

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: accounting_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-accounting}
      POSTGRES_USER:     ${POSTGRES_USER:-accounting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"             # bind to localhost only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accounting}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: accounting_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── FastAPI Application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: accounting_api
    restart: unless-stopped
    environment:
      DATABASE_URL:       postgresql+asyncpg://${POSTGRES_USER:-accounting}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-accounting}
      REDIS_URL:          redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:         ${SECRET_KEY}
      RAZORPAY_KEY:       ${RAZORPAY_KEY}
      RAZORPAY_SECRET:    ${RAZORPAY_SECRET}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      ENVIRONMENT:        production
      WORKERS:            ${API_WORKERS:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./logs:/app/logs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - external

  # ── Celery Worker (AI jobs, report generation) ────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: accounting_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q ai,reports,reconcile
    environment:
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-accounting}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-accounting}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT:       production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - internal

  # ── Celery Beat (Scheduled tasks) ─────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: accounting_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    environment:
      DATABASE_URL:  postgresql+asyncpg://${POSTGRES_USER:-accounting}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-accounting}
      REDIS_URL:     redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT:   production
    depends_on:
      - redis
      - db
    networks:
      - internal

  # ── Nginx (reverse proxy + SSL) ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: accounting_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro                  # your SSL certs
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - external

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true          # no direct internet access for DB/Redis
  external:
    driver: bridge
